name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: urbify/package-lock.json
      - run: npm ci
        working-directory: urbify
      - run: npm run lint
        working-directory: urbify
      - run: npm run typecheck
        working-directory: urbify
      - run: npm test
        working-directory: urbify
      - run: npm run build
        working-directory: urbify
